<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SITG Search Estate</title>
    <link rel="stylesheet" href="search-overlay.css">
    <style>
        /* Force everything to strip default margins and padding */
        html, body {
            background: transparent !important;
            margin: 0 !important;
            padding: 0 !important;
            overflow: hidden !important;
        }

        #sitg-search-modal {
            display: block !important;
            position: absolute !important;
            background: transparent !important;
            padding: 0 !important;
            margin: 0 !important;
            width: 100% !important;
            height: auto !important;
        }

        /* Remakes the container bar to align flatly against your Wix edge lines */
        .sitg-search-container {
            max-width: 100% !important;
            margin: 0 !important;
            padding: 0 !important;
            background: transparent !important;
            box-shadow: none !important;
        }

        .sitg-search-header-box {
            margin: 0 !important;
            padding: 0 !important;
        }

        /* Shrinks down font size and padding to fit short headers */
        .sitg-search-input-element {
            padding: 8px 12px !important;
            font-size: 13px !important;
            height: 34px !important;
            box-sizing: border-box;
            border-radius: 4px !important;
            background: #141B2D !important;
            color: #F9FAFB !important;
            border: 1px solid #1E293B !important;
        }

        #sitg-search-close-trigger {
            display: none !important;
        }

        /* Pushes search results pop-up window downwards out of header line view */
        #sitg-recommendations-target,
        #sitg-results-target {
            position: fixed !important;
            top: 50px;
            left: 5%;
            width: 90%;
            z-index: 999999 !important;
            max-height: 400px;
            overflow-y: auto;
        }
    </style>
</head>
<body>

    <div id="sitg-search-modal">
        <div class="sitg-search-container">
            <div class="sitg-search-header-box">
                <input type="text" id="sitg-search-input" class="sitg-search-input-element" placeholder="Search..." autocomplete="off">
            </div>
            <div id="sitg-recommendations-target"></div>
            <div id="sitg-results-target"></div>
        </div>
    </div>

    <script src="sitg-search-engine.js"></script>
    <script>
        document.addEventListener("DOMContentLoaded", async () => {
            const engine = new SITGSearchEngine("search-index.json");
            await engine.initialize();

            const searchInput = document.getElementById("sitg-search-input");
            const recTarget = document.getElementById("sitg-recommendations-target");
            const resultsTarget = document.getElementById("sitg-results-target");

            searchInput.addEventListener("input", (e) => {
                const query = e.target.value;
                const output = engine.search(query);
                renderUI(query, output);
            });

            function renderUI(query, output) {
                recTarget.innerHTML = "";
                resultsTarget.innerHTML = "";

                if (!query.trim()) return;

                if (output.recommendations) {
                    const r = output.recommendations;
                    recTarget.innerHTML = `
                        <div class="sitg-rec-panel" style="background:#141B2D; border:1px solid #3B82F6; padding:15px; border-radius:6px; color:#fff; margin-bottom:10px; font-family:sans-serif;">
                            <div style="color:#3B82F6; font-weight:bold; margin-bottom:8px;">🎯 SITG Alignment</div>
                            <div style="font-size:12px; opacity:0.9;"><strong>Service:</strong> ${r.service}</div>
                            <div style="font-size:12px; opacity:0.9;"><strong>Next Step:</strong> ${r.next_step}</div>
                        </div>
                    `;
                }

                if (output.results.length === 0) {
                    resultsTarget.innerHTML = `<div style="text-align: center; color: #9CA3AF; background:#141B2D; padding: 15px; font-size:12px; border-radius:6px; font-family:sans-serif;">No documents found.</div>`;
                    return;
                }

                output.results.forEach(doc => {
                    const card = document.createElement("div");
                    card.style.background = "#141B2D";
                    card.style.border = "1px solid #1E293B";
                    card.style.padding = "12px";
                    card.style.borderRadius = "6px";
                    card.style.marginBottom = "8px";
                    card.style.family = "sans-serif";
                    
                    card.innerHTML = `
                        <a href="${doc.url}" target="_top" style="color:#3B82F6; font-weight:600; text-decoration:none; font-size:14px; display:block; margin-bottom:4px;">${doc.title}</a>
                        <div style="color:#9CA3AF; font-size:12px; line-height:1.4;">${doc.desc}</div>
                    `;
                    resultsTarget.appendChild(card);
                });
            }
        });
    </script>
</body>
</html>
