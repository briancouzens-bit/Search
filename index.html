<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SITG Knowledge Platform</title>
    <link rel="stylesheet" href="search-overlay.css">
    <style>
        html, body {
            background: #0B0F19 !important;
            margin: 0 !important;
            padding: 12px !important;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            overflow-x: hidden !important;
        }

        #sitg-search-modal {
            display: block !important;
            position: relative !important;
            background: transparent !important;
            width: 100% !important;
            height: auto !important;
        }

        .sitg-search-container {
            max-width: 100% !important;
            margin: 0 !important;
            padding: 0 !important;
            background: transparent !important;
            box-shadow: none !important;
        }

        .sitg-search-input-element {
            padding: 10px 14px !important;
            font-size: 14px !important;
            height: 40px !important;
            box-sizing: border-box;
            border-radius: 6px !important;
            background: #141B2D !important;
            color: #F9FAFB !important;
            border: 1px solid #1E293B !important;
            width: 100% !important;
            margin-bottom: 16px !important;
        }

        #sitg-search-close-trigger {
            display: none !important;
        }

        #sitg-recommendations-target,
        #sitg-results-target {
            margin-top: 10px !important;
            width: 100% !important;
        }
    </style>
</head>
<body>

    <div id="sitg-search-modal">
        <div class="sitg-search-container">
            <div class="sitg-search-header-box">
                <input type="text" id="sitg-search-input" class="sitg-search-input-element" placeholder="Type to explore services, references, & whitepapers..." autocomplete="off">
            </div>
            <div id="sitg-recommendations-target"></div>
            <div id="sitg-results-target"></div>
        </div>
    </div>

    <script src="sitg-search-engine.js"></script>
    <script>
        document.addEventListener("DOMContentLoaded", async () => {
            const engine = new SITGSearchEngine("search-index.json");
            await engine.initialize();

            const searchInput = document.getElementById("sitg-search-input");
            const recTarget = document.getElementById("sitg-recommendations-target");
            const resultsTarget = document.getElementById("sitg-results-target");

            searchInput.addEventListener("input", (e) => {
                const query = e.target.value;
                const output = engine.search(query);
                renderUI(query, output);
            });

            function renderUI(query, output) {
                recTarget.innerHTML = "";
                resultsTarget.innerHTML = "";

                if (!query.trim()) return;

                // Priority 1: Render core strategic alignments first
                if (output.recommendations) {
                    const r = output.recommendations;
                    
                    // Safely format the strategic URLs back to your live Wix site
                    const serviceUrl = r.service_url ? `https://www.sitg-consulting.com/${r.service_url.replace(/^\//, '')}` : '#';
                    const resourceUrl = r.resource_url ? `https://www.sitg-consulting.com/${r.resource_url.replace(/^\//, '')}` : '#';
                    const whitepaperUrl = r.whitepaper_url ? `https://www.sitg-consulting.com/${r.whitepaper_url.replace(/^\//, '')}` : '#';

                    recTarget.innerHTML = `
                        <div class="sitg-rec-panel" style="background:#141B2D; border:1px solid #3B82F6; padding:16px; border-radius:6px; color:#fff; margin-bottom:12px;">
                            <div style="color:#3B82F6; font-weight:700; margin-bottom:10px; font-size:14px; text-transform:uppercase; letter-spacing:0.5px;">🎯 Priority SITG Service Alignment</div>
                            <div style="font-size:13px; margin-bottom:6px;"><strong>Recommended Service:</strong> <a href="${serviceUrl}" target="_top" style="color:#3B82F6; font-weight:600; text-decoration:none;">${r.service} &rarr;</a></div>
                            <div style="font-size:13px; margin-bottom:6px;"><strong>Resource Path:</strong> <a href="${resourceUrl}" target="_top" style="color:#3B82F6; font-weight:600; text-decoration:none;">${r.resource} &rarr;</a></div>
                            <div style="font-size:13px; margin-bottom:6px;"><strong>Whitepaper:</strong> <a href="${whitepaperUrl}" target="_top" style="color:#3B82F6; font-weight:600; text-decoration:none;">${r.whitepaper} &rarr;</a></div>
                            <div style="font-size:13px; color:#10B981; font-weight:600; margin-top:8px;">Next Action: ${r.next_step}</div>
                        </div>
                    `;
                }

                // Priority 2: Render background reference documentation second
                if (output.results.length === 0) {
                    if(!output.recommendations) {
                        resultsTarget.innerHTML = `<div style="text-align: center; color: #9CA3AF; background:#141B2D; padding: 16px; font-size:13px; border-radius:6px; border: 1px solid #1E293B;">No exact matches found. Try another term.</div>`;
                    }
                    return;
                }

                output.results.forEach(doc => {
                    const card = document.createElement("div");
                    card.style.background = "#111827";
                    card.style.border = "1px solid #1E293B";
                    card.style.padding = "14px";
                    card.style.borderRadius = "6px";
                    card.style.marginBottom = "10px";
                    
                    // Forces document urls to build cleanly on top of your live domain
                    const absoluteUrl = `https://www.sitg-consulting.com/${doc.url.replace(/^\//, '')}`;
                    
                    card.innerHTML = `
                        <div style="font-size:11px; color:#9CA3AF; text-transform:uppercase; margin-bottom:4px; font-weight:600;">${doc.type}</div>
                        <a href="${absoluteUrl}" target="_top" style="color:#3B82F6; font-weight:600; text-decoration:none; font-size:14px; display:block; margin-bottom:4px;">${doc.title} &rarr;</a>
                        <div style="color:#D1D5DB; font-size:12px; line-height:1.5;">${doc.desc}</div>
                    `;
                    resultsTarget.appendChild(card);
                });
            }
        });
    </script>
</body>
</html>
