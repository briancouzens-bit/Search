<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SITG Search Estate</title>
    <link rel="stylesheet" href="search-overlay.css">
    <style>
        /* Hide the default overlay display behavior to force it to show directly on load */
        #sitg-search-modal {
            display: block !important;
            position: absolute !important;
            background: transparent !important;
            padding: 20px 10px !important;
        }
        /* Hide unnecessary exit layout controls since it lives native in your embed frame */
        #sitg-search-close-trigger {
            display: none !important;
        }
        body {
            background-color: #0B0F19;
            margin: 0;
            padding: 0;
            overflow-x: hidden;
        }
    </style>
</head>
<body>

    <div id="sitg-search-modal">
        <div class="sitg-search-container">
            <div class="sitg-search-header-box">
                <input type="text" id="sitg-search-input" class="sitg-search-input-element" placeholder="Search the SITG knowledge estate (e.g., ML-KEM, HNDL, Crypto Agility)..." autocomplete="off">
                <button id="sitg-search-close-trigger" class="sitg-close-btn">&times;</button>
            </div>
            <div id="sitg-recommendations-target"></div>
            <div id="sitg-results-target"></div>
        </div>
    </div>

    <script src="sitg-search-engine.js"></script>
    <script>
        document.addEventListener("DOMContentLoaded", async () => {
            const engine = new SITGSearchEngine("search-index.json");
            await engine.initialize();

            const searchInput = document.getElementById("sitg-search-input");
            const recTarget = document.getElementById("sitg-recommendations-target");
            const resultsTarget = document.getElementById("sitg-results-target");

            // Auto-focus input box as soon as the embedded view loads up inside Wix
            searchInput.focus();

            searchInput.addEventListener("input", (e) => {
                const query = e.target.value;
                const output = engine.search(query);
                renderUI(query, output);
            });

            function renderUI(query, output) {
                recTarget.innerHTML = "";
                resultsTarget.innerHTML = "";

                if (!query.trim()) return;

                if (output.recommendations) {
                    const r = output.recommendations;
                    const confClass = `sitg-conf-${r.confidence.toLowerCase()}`;
                    
                    recTarget.innerHTML = `
                        <div class="sitg-rec-panel">
                            <div class="sitg-rec-title">🎯 SITG Strategic Alignment</div>
                            <div class="sitg-rec-grid">
                                <div class="sitg-rec-block">
                                    <div class="sitg-block-lbl">Recommended Service</div>
                                    <div class="sitg-block-val">${r.service}<span class="sitg-confidence-tag ${confClass}">${r.confidence} Confidence</span></div>
                                </div>
                                <div class="sitg-rec-block">
                                    <div class="sitg-block-lbl">Recommended Resource</div>
                                    <div class="sitg-block-val">${r.resource}</div>
                                </div>
                                <div class="sitg-rec-block">
                                    <div class="sitg-block-lbl">Recommended Whitepaper</div>
                                    <div class="sitg-block-val">${r.whitepaper}</div>
                                }
                                <div class="sitg-rec-block">
                                    <div class="sitg-block-lbl">Recommended Next Step</div>
                                    <div class="sitg-block-val">${r.next_step}</div>
                                </div>
                            </div>
                        </div>
                    `;
                }

                if (output.results.length === 0) {
                    resultsTarget.innerHTML = `<div style="text-align: center; color: var(--sitg-text-mid); padding: 40px;">No exact documents found matching this configuration criteria.</div>`;
                    return;
                }

                output.results.forEach(doc => {
                    const card = document.createElement("div");
                    card.className = "sitg-result-card";
                    card.innerHTML = `
                        <div class="sitg-card-meta">
                            <span class="sitg-type-badge">${doc.type}</span>
                        </div>
                        <a href="${doc.url}" class="sitg-card-title" target="_top">${doc.title}</a>
                        <div class="sitg-card-desc">${doc.desc}</div>
                    `;
                    
                    card.querySelector("a").addEventListener("click", () => {
                        engine.trackClick(query, doc.url);
                    });

                    resultsTarget.appendChild(card);
                });
            }
        });
    </script>
</body>
</html>
