<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SITG Search Estate</title>
    <link rel="stylesheet" href="search-overlay.css">
    <style>
        /* Force everything to lock down to zero height until active */
        html, body {
            background: transparent !important;
            margin: 0 !important;
            padding: 0 !important;
            overflow: hidden !important;
            height: 34px !important; /* Forces the entire web page to stay perfectly short */
        }

        #sitg-search-modal {
            display: block !important;
            position: absolute !important;
            background: transparent !important;
            padding: 0 !important;
            margin: 0 !important;
            width: 100% !important;
            height: 34px !important;
        }

        .sitg-search-container {
            max-width: 100% !important;
            margin: 0 !important;
            padding: 0 !important;
            background: transparent !important;
            box-shadow: none !important;
        }

        .sitg-search-header-box {
            margin: 0 !important;
            padding: 0 !important;
        }

        /* Tiny, flat, neat input bar style */
        .sitg-search-input-element {
            padding: 6px 12px !important;
            font-size: 13px !important;
            height: 34px !important;
            box-sizing: border-box;
            border-radius: 4px !important;
            background: #141B2D !important;
            color: #F9FAFB !important;
            border: 1px solid #1E293B !important;
            width: 100% !important;
        }

        #sitg-search-close-trigger {
            display: none !important;
        }

        /* The results panel pops OVER your website elements, not inside the page layout flow */
        #sitg-recommendations-target,
        #sitg-results-target {
            position: fixed !important;
            top: 40px;
            left: 0;
            width: 100%;
            z-index: 999999 !important;
            max-height: 350px;
            overflow-y: auto;
            box-sizing: border-box;
        }
    </style>
</head>
<body>

    <div id="sitg-search-modal">
        <div class="sitg-search-container">
            <div class="sitg-search-header-box">
                <input type="text" id="sitg-search-input" class="sitg-search-input-element" placeholder="Search..." autocomplete="off">
            </div>
            <div id="sitg-recommendations-target"></div>
            <div id="sitg-results-target"></div>
        </div>
    </div>

    <script src="sitg-search-engine.js"></script>
    <script>
        document.addEventListener("DOMContentLoaded", async () => {
            const engine = new SITGSearchEngine("search-index.json");
            await engine.initialize();

            const searchInput = document.getElementById("sitg-search-input");
            const recTarget = document.getElementById("sitg-recommendations-target");
            const resultsTarget = document.getElementById("sitg-results-target");

            searchInput.addEventListener("input", (e) => {
                const query = e.target.value;
                const output = engine.search(query);
                renderUI(query, output);
            });

            function renderUI(query, output) {
                recTarget.innerHTML = "";
                resultsTarget.innerHTML = "";

                if (!query.trim()) {
                    // Shrink page rules completely back to standard flat dimensions if input is empty
                    document.documentElement.style.height = "34px";
                    document.body.style.height = "34px";
                    return;
                }

                // Dynamically allow the layout container to grow downwards only while user is typing
                document.documentElement.style.height = "auto";
                document.body.style.height = "auto";

                if (output.recommendations) {
                    const r = output.recommendations;
                    recTarget.innerHTML = `
                        <div class="sitg-rec-panel" style="background:#141B2D; border:1px solid #3B82F6; padding:12px; border-radius:4px; color:#fff; margin-bottom:8px; font-family:sans-serif; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.3);">
                            <div style="color:#3B82F6; font-weight:bold; margin-bottom:6px; font-size:13px;">🎯 SITG Alignment</div>
                            <div style="font-size:12px; opacity:0.9;"><strong>Service:</strong> ${r.service}</div>
                            <div style="font-size:12px; opacity:0.9;"><strong>Next Step:</strong> ${r.next_step}</div>
                        </div>
                    `;
                }

                if (output.results.length === 0) {
                    resultsTarget.innerHTML = `<div style="text-align: center; color: #9CA3AF; background:#141B2D; padding: 12px; font-size:12px; border-radius:4px; font-family:sans-serif; border: 1px solid #1E293B; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.3);">No documents found.</div>`;
                    return;
                }

                output.results.forEach(doc => {
                    const card = document.createElement("div");
                    card.style.background = "#141B2D";
                    card.style.border = "1px solid #1E293B";
                    card.style.padding = "10px";
                    card.style.borderRadius = "4px";
                    card.style.marginBottom = "6px";
                    card.style.fontFamily = "sans-serif";
                    card.style.boxShadow = "0 10px 15px -3px rgba(0,0,0,0.3)";
                    
                    card.innerHTML = `
                        <a href="${doc.url}" target="_top" style="color:#3B82F6; font-weight:600; text-decoration:none; font-size:13px; display:block; margin-bottom:2px;">${doc.title}</a>
                        <div style="color:#9CA3AF; font-size:11px; line-height:1.4;">${doc.desc}</div>
                    `;
                    resultsTarget.appendChild(card);
                });
            }
        });
    </script>
</body>
</html>
